[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sonar-api"
version = "1.0.0"
description = "FastAPI wrapper for sonar classification"
requires-python = ">=3.9"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    "pydantic>=2.0.0",
    "numpy>=1.24.0",
    "joblib>=1.3.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["sonar_api*"]
