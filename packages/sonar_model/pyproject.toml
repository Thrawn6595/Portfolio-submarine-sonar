[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "sonar-model"
version = "1.0.0"
description = "Sonar mine vs rock classification model"
requires-python = ">=3.9"
dependencies = ["pandas>=2.0.0", "numpy>=1.24.0", "scikit-learn>=1.3.0", "joblib>=1.3.0"]

[tool.setuptools.packages.find]
where = ["."]
include = ["sonar_model*"]
